name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  SOURCE_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

jobs:
  build-sender:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - id: v
        shell: bash
        run: |
          version="$(python3 -c "from datetime import datetime, timezone; ts = '${SOURCE_TIMESTAMP}'.replace('Z', '+00:00'); dt = datetime.fromisoformat(ts).astimezone(timezone.utc); print(f'{dt:%Y}.{dt.month}{dt:%d}.{dt.hour}{dt:%M}')")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - shell: bash
        run: sed -i '' "1,5s/^version = \".*\"/version = \"${{ steps.v.outputs.version }}\"/" sender/Cargo.toml
      - run: cargo test -p hotswitch-proto
      - run: cargo build --release -p hotswitch-sender
      - run: tar -czf hotswitch-sender-aarch64-apple-darwin.tar.gz -C target/release hotswitch-sender
      - uses: actions/upload-artifact@v4
        with:
          name: hotswitch-sender-macos
          path: hotswitch-sender-aarch64-apple-darwin.tar.gz

  build-receiver:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - id: v
        shell: bash
        run: |
          version="$(python3 -c "from datetime import datetime, timezone; ts = '${SOURCE_TIMESTAMP}'.replace('Z', '+00:00'); dt = datetime.fromisoformat(ts).astimezone(timezone.utc); print(f'{dt:%Y}.{dt.month}{dt:%d}.{dt.hour}{dt:%M}')")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - shell: bash
        run: sed -i "1,5s/^version = \".*\"/version = \"${{ steps.v.outputs.version }}\"/" receiver/Cargo.toml
      - run: cargo build --release -p hotswitch-receiver
      - run: Compress-Archive -Path target/release/hotswitch-receiver.exe -DestinationPath hotswitch-receiver-x86_64-pc-windows-msvc.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: hotswitch-receiver-windows
          path: hotswitch-receiver-x86_64-pc-windows-msvc.zip

  release:
    needs: [build-sender, build-receiver]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-sender.outputs.version }}
          files: artifacts/*
